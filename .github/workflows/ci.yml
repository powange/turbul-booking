name: ci

on: push

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    # `DATABASE_URL` sert à `prisma generate` (postinstall) et à `prisma
    # migrate deploy` avant les tests d'intégration. `TEST_DATABASE_URL`
    # pointe vers le même service mais reste explicite pour les tests.
    env:
      DATABASE_URL: postgresql://turbul:turbul@localhost:5432/turbul_test
      TEST_DATABASE_URL: postgresql://turbul:turbul@localhost:5432/turbul_test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: turbul
          POSTGRES_PASSWORD: turbul
          POSTGRES_DB: turbul_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U turbul"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration
