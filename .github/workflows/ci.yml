name: ci

on: push

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    # Variables non-sensibles utilisées par `prisma generate` (postinstall)
    # et par les commandes Prisma qui chargent prisma.config.ts. Aucun
    # accès réel à une base n'est tenté en CI : on fournit juste une URL
    # syntaxiquement valide pour que la config se résolve.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test
