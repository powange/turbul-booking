services:
  postgres:
    image: postgres:17-alpine
    container_name: turbul-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: turbul
      POSTGRES_PASSWORD: turbul
      POSTGRES_DB: turbul_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turbul -d turbul_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
